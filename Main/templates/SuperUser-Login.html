<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperUser Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f4f7fb;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .login-container{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:16px;
            padding:35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .login-header{
            text-align:center;
            margin-bottom:30px;
        }

        .login-icon{
            width:70px;
            height:70px;
            background:#2563eb;
            color:#fff;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 15px;
            font-size:28px;
        }

        .login-header h2{
            font-size:28px;
            color:#1e293b;
            margin-bottom:8px;
        }

        .login-header p{
            color:#64748b;
            font-size:14px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:600;
            color:#334155;
        }

        .input-box{
            position:relative;
        }

        .input-box i{
            position:absolute;
            top:50%;
            left:15px;
            transform:translateY(-50%);
            color:#94a3b8;
            font-size:15px;
        }

        .form-control{
            width:100%;
            height:50px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            padding:0 15px 0 45px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        .form-control:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,0.1);
        }

        .login-btn{
            width:100%;
            height:50px;
            border:none;
            background:#2563eb;
            color:#fff;
            font-size:16px;
            font-weight:600;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#1d4ed8;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            font-size:13px;
            color:#94a3b8;
        }

        @media(max-width:480px){

            .login-container{
                padding:25px;
            }

            .login-header h2{
                font-size:24px;
            }

        }

    </style>
</head>
<body>

<div class="login-container">

    <div class="login-header">

        <div class="login-icon">
            <i class="fas fa-user-shield"></i>
        </div>

        <h2>SuperUser Login</h2>

        <p>
            Login to access the PESA Fund Management System
        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label>Username</label>

            <div class="input-box">

                <i class="fas fa-user"></i>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter Username"
                    required
                >

            </div>

        </div>
        <div class="form-group">

            <label>Password</label>

            <div class="input-box">

                <i class="fas fa-lock"></i>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required
                >

            </div>

        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="footer-text">
        © 2026 Chankya E-Services. All rights reserved.
    </div>
</div>

</body>
</html>
