<!-- load-Sidebar.html - Simple Sticky Version -->
<!-- Back Button to Work Master -->
<div class="sidebar-section" style="padding: 10px 12px 0 12px; position: sticky; top: 0; background: var(--navy); z-index: 20;">
    <a href="{% url 'Activity-Work-Master' %}" 
       style="display: flex; align-items: center; gap: 8px; 
              background: var(--gold); 
              color: var(--navy); 
              text-decoration: none; 
              padding: 8px 12px; 
              border-radius: 6px; 
              font-size: 12px; 
              font-weight: 700;
              width: 100%;
              box-sizing: border-box;
              transition: all 0.2s ease;"
       onmouseover="this.style.background='#cf6d00'; this.style.color='#fff';"
       onmouseout="this.style.background='var(--gold)'; this.style.color='var(--navy)';">
        <i class="fa fa-arrow-left" style="font-size: 11px;"></i>
        <span>कामकाज वर परत या</span>
    </a>
</div>
